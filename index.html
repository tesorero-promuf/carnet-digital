<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Carnet digital · PROMUF</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy-950:#060f1f; --navy-900:#0a1830; --navy-800:#0e2244; --navy-700:#13315e;
    --teal-300:#7fe3d4; --teal-400:#3fd0c9; --teal-500:#1aa39a; --teal-700:#0d5c5c;
    --gold-200:#f6e3ab; --gold-400:#e6c468; --gold-500:#d4af37; --gold-700:#a8801f;
    --cream-50:#faf6ec; --ink:#0a1830;
    --green-600:#1d9e75; --green-800:#085041;
    --red-600:#e24b4a; --red-800:#791f1f;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:#e9e4d6;}
  body{
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    font-family:'Poppins',sans-serif;color:var(--ink);padding:36px 18px;
  }
  #app{width:100%;display:flex;justify-content:center;}
  .card{width:320px;border-radius:22px;position:relative;overflow:hidden;
    box-shadow:0 18px 40px -12px rgba(10,24,48,0.35), 0 4px 12px rgba(10,24,48,0.12);}
  .ribbon{
    position:absolute;top:14px;right:14px;font-size:9px;font-weight:700;letter-spacing:1px;
    padding:5px 11px;border-radius:12px;text-transform:uppercase;z-index:5;
  }
  .ribbon.ok{background:rgba(29,158,117,0.18);color:var(--green-600);border:1px solid var(--green-600);}
  .ribbon.bad{background:rgba(226,75,74,0.16);color:var(--red-600);border:1px solid var(--red-600);}
  .avatar-icon{width:58%;height:58%;color:#9fb0c8;opacity:0.85;}
  .d3 .avatar-icon{color:#cfd6e4;}
  .photo-inner img{width:100%;height:100%;object-fit:cover;}

  /* ---- estado / error ---- */
  .state-box{
    width:320px;background:var(--cream-50);border-radius:18px;padding:40px 26px;
    text-align:center;box-shadow:0 10px 30px -10px rgba(10,24,48,0.25);
  }
  .state-box .ic{font-size:30px;margin-bottom:14px;}
  .state-box h2{font-size:16px;margin:0 0 8px;color:var(--navy-900);}
  .state-box p{font-size:13px;color:#6b6a57;margin:0;line-height:1.6;}

  /* ============ DESIGN 1 — CLASICO ============ */
  .card.d1{background:linear-gradient(160deg,var(--navy-900) 0%, var(--navy-950) 100%);
    padding:26px 22px 28px;color:#fff;border:1px solid rgba(212,175,55,0.25);}
  .d1 .top{display:flex;align-items:center;gap:10px;margin-bottom:22px;}
  .d1 .top img.logo{width:38px;height:38px;border-radius:50%;}
  .d1 .top .word{font-size:13px;font-weight:700;letter-spacing:1px;}
  .d1 .top .word .pro{color:var(--teal-300);} .d1 .top .word .muf{color:var(--gold-400);}
  .d1 .top .sub{font-size:8px;letter-spacing:0.5px;color:#aebbd0;margin-top:1px;}
  .d1 .photo-wrap{width:118px;height:118px;border-radius:50%;margin:6px auto 18px;
    background:conic-gradient(from 180deg,var(--teal-400),var(--gold-400),var(--teal-400));
    display:flex;align-items:center;justify-content:center;padding:3px;}
  .d1 .photo-inner{width:100%;height:100%;border-radius:50%;background:var(--navy-800);
    display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .d1 .name{text-align:center;font-size:18px;font-weight:700;margin-bottom:4px;}
  .d1 .ced{text-align:center;font-size:11px;color:#9fb0c8;letter-spacing:1px;margin-bottom:14px;}
  .d1 .role-pill{display:block;margin:0 auto 8px;width:fit-content;background:var(--teal-700);
    color:var(--teal-300);font-size:12px;font-weight:600;letter-spacing:1.5px;padding:7px 22px;border-radius:20px;}
  .d1 .period{text-align:center;font-size:10.5px;color:#7e8ca6;letter-spacing:1px;margin-bottom:18px;}
  .d1 .divider{height:1px;background:rgba(255,255,255,0.12);margin:0 0 18px;}
  .d1 .qr-row{display:flex;align-items:center;gap:14px;}
  .d1 .qr-box{background:#fff;padding:6px;border-radius:10px;flex-shrink:0;width:78px;height:78px;
    display:flex;align-items:center;justify-content:center;}
  .d1 .qr-text{font-size:9.5px;color:#9fb0c8;line-height:1.5;}
  .d1 .qr-text b{color:#fff;display:block;font-size:10.5px;margin-bottom:2px;}
  .d1 .foot{margin-top:18px;text-align:center;font-size:9px;color:#5c6c8a;letter-spacing:1.5px;}

  /* ============ DESIGN 2 — HORIZONTAL ============ */
  .card.d2{width:340px;border-radius:18px;display:flex;background:var(--cream-50);
    border:1px solid rgba(10,24,48,0.08);}
  .d2 .left{width:118px;flex-shrink:0;background:linear-gradient(165deg,var(--navy-900),var(--navy-950));
    display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:16px 10px;}
  .d2 .left img.logo{width:30px;height:30px;border-radius:50%;}
  .d2 .photo-wrap{width:74px;height:74px;border-radius:14px;
    background:linear-gradient(145deg,var(--teal-400),var(--gold-500));padding:2.5px;}
  .d2 .photo-inner{width:100%;height:100%;border-radius:12px;background:var(--navy-800);
    display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .d2 .left .id-small{font-size:8px;color:var(--gold-400);letter-spacing:1px;font-weight:600;}
  .d2 .right{flex:1;padding:18px 16px;display:flex;flex-direction:column;}
  .d2 .right .brand{font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--teal-700);margin-bottom:10px;}
  .d2 .right .brand span{color:var(--gold-700);}
  .d2 .right .name{font-size:15px;font-weight:700;color:var(--navy-900);line-height:1.25;margin-bottom:3px;}
  .d2 .right .ced{font-size:10px;color:#6b7280;letter-spacing:0.5px;margin-bottom:10px;}
  .d2 .right .role-pill{display:inline-block;background:var(--navy-900);color:var(--teal-300);
    font-size:9.5px;font-weight:600;letter-spacing:1px;padding:4px 12px;border-radius:14px;margin-bottom:8px;width:fit-content;}
  .d2 .right .period{font-size:9px;color:#8b8975;margin-bottom:auto;}
  .d2 .right .qr-row{display:flex;align-items:flex-end;justify-content:space-between;margin-top:10px;}
  .d2 .right .qr-box{background:#fff;border:1px solid #e3ddc8;padding:4px;border-radius:8px;
    width:54px;height:54px;display:flex;align-items:center;justify-content:center;}
  .d2 .right .scan-label{font-size:7.5px;color:#9b9885;letter-spacing:0.5px;text-align:right;max-width:90px;line-height:1.4;}

  /* ============ DESIGN 3 — MINIMALISTA ============ */
  .card.d3{background:var(--cream-50);padding:30px 26px 26px;border:1px solid var(--gold-400);position:relative;}
  .d3::before{content:"";position:absolute;inset:10px;border:1px solid rgba(212,175,55,0.45);
    border-radius:14px;pointer-events:none;}
  .d3 .top{display:flex;flex-direction:column;align-items:center;margin-bottom:18px;}
  .d3 .top img.logo{width:46px;height:46px;border-radius:50%;margin-bottom:8px;}
  .d3 .top .assoc{font-family:'Playfair Display',serif;font-size:13px;font-weight:600;letter-spacing:1.5px;
    color:var(--navy-900);text-transform:uppercase;}
  .d3 .top .assoc-sub{font-size:7.5px;letter-spacing:1px;color:#8a8569;margin-top:2px;}
  .d3 .rule{width:34px;height:1.5px;background:var(--gold-500);margin:16px auto;}
  .d3 .photo-wrap{width:96px;height:96px;margin:0 auto 16px;border:1.5px solid var(--gold-500);padding:5px;}
  .d3 .photo-inner{width:100%;height:100%;background:var(--navy-900);overflow:hidden;display:flex;align-items:center;justify-content:center;}
  .d3 .name{text-align:center;font-family:'Playfair Display',serif;font-size:18px;font-weight:600;color:var(--navy-900);margin-bottom:3px;}
  .d3 .ced{text-align:center;font-size:10px;color:#9b9680;letter-spacing:1px;margin-bottom:14px;}
  .d3 .role-row{display:flex;justify-content:center;gap:8px;margin-bottom:6px;}
  .d3 .role-pill{font-size:10.5px;font-weight:600;letter-spacing:2px;color:var(--gold-700);text-transform:uppercase;}
  .d3 .period{text-align:center;font-size:9.5px;color:#a39d85;letter-spacing:0.5px;margin-bottom:18px;}
  .d3 .qr-wrap{display:flex;flex-direction:column;align-items:center;}
  .d3 .qr-box{background:#fff;border:1px solid var(--gold-400);padding:6px;border-radius:6px;
    width:76px;height:76px;display:flex;align-items:center;justify-content:center;}
  .d3 .qr-caption{font-size:8px;letter-spacing:1.5px;color:#a39d85;margin-top:8px;text-transform:uppercase;}
  .d3 .foot-id{text-align:center;font-size:8.5px;letter-spacing:1.5px;color:var(--navy-700);margin-top:14px;font-weight:600;}

  /* ============ DESIGN 4 — MODERNA / GLASS ============ */
  .card.d4{background:radial-gradient(circle at 30% 0%, #103a52 0%, var(--navy-950) 55%, #051018 100%);
    padding:0;position:relative;color:#fff;min-height:560px;}
  .d4 .watermark{position:absolute;top:-30px;right:-60px;width:280px;height:289px;opacity:0.12;transform:rotate(8deg);}
  .d4 .content{position:relative;padding:24px 20px 26px;display:flex;flex-direction:column;height:100%;}
  .d4 .top{display:flex;align-items:center;gap:9px;margin-bottom:26px;}
  .d4 .top img.logo{width:32px;height:32px;border-radius:50%;}
  .d4 .top .word{font-size:12px;font-weight:700;letter-spacing:1px;}
  .d4 .top .word .pro{color:var(--teal-300);} .d4 .top .word .muf{color:var(--gold-400);}
  .d4 .glass{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.18);border-radius:18px;
    padding:22px 18px;backdrop-filter:blur(6px);flex:1;display:flex;flex-direction:column;align-items:center;}
  .d4 .photo-wrap{width:104px;height:104px;border-radius:50%;margin-bottom:14px;
    background:linear-gradient(135deg,var(--teal-300),var(--teal-500) 55%,var(--gold-400));padding:3px;}
  .d4 .photo-inner{width:100%;height:100%;border-radius:50%;background:#0c1c33;
    display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .d4 .name{font-size:18px;font-weight:700;text-align:center;margin-bottom:3px;}
  .d4 .ced{font-size:10.5px;color:#a9c2d6;letter-spacing:1px;margin-bottom:14px;}
  .d4 .role-pill{background:rgba(63,208,201,0.16);border:1px solid var(--teal-400);color:var(--teal-300);
    font-size:11px;font-weight:600;letter-spacing:1.5px;padding:6px 20px;border-radius:18px;margin-bottom:8px;}
  .d4 .period{font-size:10px;color:#7e93ad;letter-spacing:1px;margin-bottom:18px;}
  .d4 .qr-box{background:#fff;padding:7px;border-radius:10px;width:84px;height:84px;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 0 0 1px var(--teal-400), 0 0 18px rgba(63,208,201,0.35);}
  .d4 .qr-caption{font-size:8.5px;color:#7e93ad;letter-spacing:1.5px;margin-top:10px;text-align:center;}
  .d4 .foot{margin-top:16px;font-size:8.5px;color:#516781;letter-spacing:1.5px;text-align:center;}
</style>
</head>

  var AVATAR_SVG = '<svg class="avatar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="3.6"/><path d="M4.5 19.2c0-3.8 3.4-5.8 7.5-5.8s7.5 2 7.5 5.8"/></svg>';
  var JSON_PATH = "data/members.json";

  function esc(s){
    return String(s == null ? "" : s).replace(/[&<>"']/g, function(c){
      return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c];
    });
  }

  function photoBlock(m){
    if(m.foto && m.foto.trim() !== ""){
      return '<img src="' + esc(m.foto) + '" alt="' + esc(m.nombre) + '">';
    }
    return AVATAR_SVG;
  }

  function isVigente(m){
    var anio = new Date().getFullYear();
    var fin = parseInt(m.periodo_fin, 10);
    if(isNaN(fin)) return (m.estado || "activo").toLowerCase() === "activo";
    return anio <= fin;
  }

  function ribbon(m){
    return isVigente(m)
      ? '<div class="ribbon ok">Vigente</div>'
      : '<div class="ribbon bad">Vencido</div>';
  }

  function render1(m){
    return '' +
    '<div class="card d1">' + ribbon(m) +
      '<div class="top"><img class="logo" src="' + LOGO + '"><div><div class="word"><span class="pro">PRO</span><span class="muf">MUF</span></div><div class="sub">PROFESIONALES DE LA MÚSICA DE FALCÓN</div></div></div>' +
      '<div class="photo-wrap"><div class="photo-inner">' + photoBlock(m) + '</div></div>' +
      '<div class="name">' + esc(m.nombre) + '</div>' +
      '<div class="ced">' + esc(m.cedula) + '</div>' +
      '<div class="role-pill">' + esc(m.rol) + '</div>' +
      '<div class="period">PERÍODO ' + esc(m.periodo_inicio) + ' — ' + esc(m.periodo_fin) + '</div>' +
      '<div class="divider"></div>' +
      '<div class="qr-row"><div class="qr-box" id="qr-target"></div><div class="qr-text"><b>Verificación digital</b>Escanea para confirmar la vigencia del agremiado en el padrón de PROMUF.</div></div>' +
      '<div class="foot">' + esc(m.id) + '</div>' +
    '</div>';
  }

  function render2(m){
    return '' +
    '<div class="card d2">' + ribbon(m) +
      '<div class="left"><img class="logo" src="' + LOGO + '"><div class="photo-wrap"><div class="photo-inner">' + photoBlock(m) + '</div></div><div class="id-small">' + esc(m.id) + '</div></div>' +
      '<div class="right">' +
        '<div class="brand">PRO<span>MUF</span></div>' +
        '<div class="name">' + esc(m.nombre) + '</div>' +
        '<div class="ced">C.I. ' + esc(m.cedula) + '</div>' +
        '<div class="role-pill">' + esc(m.rol) + '</div>' +
        '<div class="period">Vigente ' + esc(m.periodo_inicio) + ' – ' + esc(m.periodo_fin) + '</div>' +
        '<div class="qr-row"><div class="qr-box" id="qr-target"></div><div class="scan-label">Escanear para verificar agremiado</div></div>' +
      '</div>' +
    '</div>';
  }

  function render3(m){
    return '' +
    '<div class="card d3">' + ribbon(m) +
      '<div class="top"><img class="logo" src="' + LOGO + '"><div class="assoc">PROMUF</div><div class="assoc-sub">PROFESIONALES DE LA MÚSICA DE FALCÓN</div></div>' +
      '<div class="rule"></div>' +
      '<div class="photo-wrap"><div class="photo-inner">' + photoBlock(m) + '</div></div>' +
      '<div class="name">' + esc(m.nombre) + '</div>' +
      '<div class="ced">' + esc(m.cedula) + '</div>' +
      '<div class="role-row"><div class="role-pill">' + esc(m.rol) + '</div></div>' +
      '<div class="period">Período ' + esc(m.periodo_inicio) + ' – ' + esc(m.periodo_fin) + '</div>' +
      '<div class="qr-wrap"><div class="qr-box" id="qr-target"></div><div class="qr-caption">Verificar agremiado</div></div>' +
      '<div class="foot-id">' + esc(m.id) + '</div>' +
    '</div>';
  }

  function render4(m){
    return '' +
    '<div class="card d4">' + ribbon(m) +
      '<img class="watermark" src="' + LOGO_WATERMARK + '">' +
      '<div class="content">' +
        '<div class="top"><img class="logo" src="' + LOGO + '"><div class="word"><span class="pro">PRO</span><span class="muf">MUF</span></div></div>' +
        '<div class="glass">' +
          '<div class="photo-wrap"><div class="photo-inner">' + photoBlock(m) + '</div></div>' +
          '<div class="name">' + esc(m.nombre) + '</div>' +
          '<div class="ced">' + esc(m.cedula) + '</div>' +
          '<div class="role-pill">' + esc(m.rol) + '</div>' +
          '<div class="period">PERÍODO ' + esc(m.periodo_inicio) + ' – ' + esc(m.periodo_fin) + '</div>' +
          '<div class="qr-box" id="qr-target"></div>' +
          '<div class="qr-caption">ESCANEA PARA VERIFICAR<br>' + esc(m.id) + '</div>' +
        '</div>' +
      '</div>' +
    '</div>';
  }

  var RENDERERS = {"1": render1, "2": render2, "3": render3, "4": render4};

  function showState(icon, title, text){
    document.getElementById('app').innerHTML =
      '<div class="state-box"><div class="ic">' + icon + '</div><h2>' + esc(title) + '</h2><p>' + esc(text) + '</p></div>';
  }

  function canonicalUrl(id){
    return location.origin + location.pathname + '?id=' + encodeURIComponent(id);
  }

  function paintQR(id){
    var el = document.getElementById('qr-target');
    if(!el) return;
    new QRCode(el, {
      text: canonicalUrl(id),
      width: 80, height: 80,
      colorDark: "#0a1830", colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.M
    });
  }

  async function init(){
    var params = new URLSearchParams(location.search);
    var id = params.get('id');
    var design = params.get('design') || '1';
    if(!RENDERERS[design]) design = '1';

    if(!id){
      showState('🪪', 'Falta el código del carnet', 'Este enlace necesita un identificador, por ejemplo: ?id=PMF-26-001');
      return;
    }

    try{
      var res = await fetch(JSON_PATH, {cache:'no-store'});
      if(!res.ok) throw new Error('no-fetch');
      var members = await res.json();
      var member = members.find(function(m){ return m.id === id; });
      if(!member){
        showState('❓', 'Agremiado no encontrado', 'El código ' + id + ' no está registrado en el padrón de PROMUF.');
        return;
      }
      document.getElementById('app').innerHTML = RENDERERS[design](member);
      paintQR(member.id);
    }catch(err){
      showState('⚠️', 'No se pudo cargar el carnet', 'Verifica tu conexión a internet e intenta de nuevo.');
    }
  }

  init();
</script>
